<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=yes" />

    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div id="successPopup">Record saved successfully!</div>

    <div class="header-row">
        <h1><span>CGPA</span> Calculator</h1>
        <button class="history-button" onclick="viewHistory(history)">History</button>
    </div>

    <form id="cgpaform">
        <fieldset>
            <legend>School Category</legend>
            <div class="schooltype">
                <div class="option">
                    <input type="radio" id="university" name="schooltype" value="0" checked>
                    <label for="university">University</label>
                </div>
                <div class="option">
                    <input type="radio" id="polytechnic" name="schooltype" value="1">
                    <label for="polytechnic">Polytechnic</label>
                </div>
            </div>
        </fieldset>

        <!-- Only one dynamic container -->
        <div id="coursesContainer"></div>

        <button type="button" id="addBtn">Add</button>
        <button type="submit">Calculate</button>
    </form>

    <div id="resultBox">
        <label for="cgpaResult"><strong>Result:</strong></label><br>
        <textarea id="cgpaResult" readonly></textarea>
    </div>

    <div id="buttonRow">
        <button type="button" id="resetBtn">Reset</button>
    </div>

    <div id="savePrompt" class="modal small-overlay">
        <div class="modal-content">
            <p>Do you want to save your CGPA record?</p>
            <div class="modal-buttons">
                <button id="yesBtn">Yes</button>
                <button id="noBtn">No</button>
            </div>
        </div>
    </div>

    <div id="namePrompt" class="modal small-overlay">
        <div class="modal-content">
            <label for="saveName">Enter the name you wish to save your result with:</label>
            <input type="text" id="saveName" placeholder="Enter name here" style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc;">
            <div class="modal-buttons">
                <button id="saveNameBtn">Save</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
<div id="historyModal" class="modal">
  <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
    <h3>Your Saved CGPA History</h3>
    <div style="margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
      <label for="sortSelect" style="display:none;">Sort by:</label>
      <select id="sortSelect" onchange="handleSortChange()" style="padding: 8px; border-radius: 5px;">
        <option value="date" selected>Sort by Date (Newest First)</option>
        <option value="name">Sort by Name (A–Z)</option>
      </select>

      <label for="searchInput" style="display:none;">Search:</label>
      <input type="text" id="searchInput" oninput="handleSortChange()" placeholder="Search by name..."
        style="padding: 8px; border-radius: 5px; border: 1px solid #ccc; width: 200px;">
    </div>

    <div id="historyList" style="text-align: left; margin-top: 10px;"></div>

    <div class="modal-buttons" style="margin-top: 20px;">
      <button onclick="clearHistory()">Clear All</button>
      <button onclick="closeHistory()">Close</button>
    </div>
  </div>
</div>


    <script src="/static/script.js"></script>
</body>
</html>
